source_id: oecd_data
source_num: 140
layer: 19
couche: International
name: OECD Data — indicateurs OCDE
description: 'Source #140 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://stats.oecd.org/sdmx-json/data
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.oecd_indicators_raw
bronze_fields:
- name: series_key
  type: VARCHAR(128)
  primary_key: true
- name: country
  type: VARCHAR(8)
  primary_key: false
- name: indicator
  type: VARCHAR(64)
  primary_key: false
- name: year
  type: INT
  primary_key: false
- name: value
  type: NUMERIC
  primary_key: false
conflict_strategy: ON CONFLICT (series_key) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
