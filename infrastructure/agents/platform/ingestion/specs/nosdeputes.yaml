layer: 14
couche: Lobbying
name: NosDéputés.fr — auditions parlementaires
description: 'Source #97 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://www.nosdeputes.fr/deputes/json
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=168
