bronze_fields:
- name: depute_id
  type: VARCHAR(64)
  primary_key: true
- name: nom
  type: VARCHAR(255)
  primary_key: false
- name: prenom
  type: VARCHAR(255)
  primary_key: false
- name: groupe
  type: VARCHAR(64)
  primary_key: false
- name: circonscription
  type: VARCHAR(64)
  primary_key: false
conflict_strategy: ON CONFLICT (depute_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
