source_id: orcid
source_num: 62
layer: 9
couche: PI/R&D
name: ORCID — chercheurs identifiés
description: 'Source #62 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://pub.orcid.org/v3.0/search
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.orcid_researchers_raw
bronze_fields:
- name: orcid_id
  type: VARCHAR(32)
  primary_key: true
- name: given_names
  type: VARCHAR(255)
  primary_key: false
- name: family_name
  type: VARCHAR(255)
  primary_key: false
- name: affiliations
  type: TEXT[]
  primary_key: false
conflict_strategy: ON CONFLICT (orcid_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
