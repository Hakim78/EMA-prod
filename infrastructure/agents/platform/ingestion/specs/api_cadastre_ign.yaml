bronze_table: bronze.cadastre_parcelles_raw
bronze_fields:
- name: parcelle_id
  type: VARCHAR(32)
  primary_key: true
- name: code_insee
  type: VARCHAR(8)
  primary_key: false
- name: section
  type: VARCHAR(8)
  primary_key: false
- name: numero
  type: VARCHAR(8)
  primary_key: false
- name: contenance
  type: INT
  primary_key: false
conflict_strategy: ON CONFLICT (parcelle_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
