source_id: wikidata_sparql
source_num: 11
layer: 2
couche: IDs internationaux
name: Wikidata Query Service — SPARQL SIREN↔QID
description: 'Source #11 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://query.wikidata.org/sparql
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=168
sla_minutes: 10140
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.wikidata_entreprises_raw
bronze_fields:
- name: qid
  type: VARCHAR(32)
  primary_key: true
- name: label
  type: VARCHAR(512)
  primary_key: false
- name: siren
  type: CHAR(9)
  primary_key: false
- name: isin
  type: VARCHAR(12)
  primary_key: false
- name: founders
  type: TEXT[]
  primary_key: false
conflict_strategy: ON CONFLICT (qid) DO UPDATE SET payload = EXCLUDED.payload, ingested_at
  = now()
