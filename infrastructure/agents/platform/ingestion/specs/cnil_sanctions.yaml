source_id: cnil_sanctions
source_num: 36
layer: 6
couche: Juridique
name: CNIL sanctions — amendes RGPD
description: 'Source #36 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://www.cnil.fr/fr/la-cnil-sanctionne/json
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=168
sla_minutes: 10140
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.cnil_sanctions_raw
bronze_fields:
- name: sanction_id
  type: VARCHAR(64)
  primary_key: true
- name: entite
  type: VARCHAR(512)
  primary_key: false
- name: siren
  type: CHAR(9)
  primary_key: false
- name: date_sanction
  type: DATE
  primary_key: false
- name: montant
  type: NUMERIC
  primary_key: false
- name: motif
  type: TEXT
  primary_key: false
conflict_strategy: ON CONFLICT (sanction_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
