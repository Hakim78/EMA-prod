source_id: urssaf_opendata
source_num: 32
layer: 5
couche: Publications légales
name: URSSAF Open Data — données trimestrielles cotisants
description: 'Source #32 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://open.urssaf.fr/api/records/1.0/search
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.urssaf_trimestriel_raw
bronze_fields:
- name: record_id
  type: VARCHAR(64)
  primary_key: true
- name: secteur
  type: VARCHAR(128)
  primary_key: false
- name: departement
  type: VARCHAR(8)
  primary_key: false
- name: trimestre
  type: VARCHAR(16)
  primary_key: false
- name: nb_cotisants
  type: INT
  primary_key: false
- name: masse_salariale
  type: NUMERIC
  primary_key: false
conflict_strategy: ON CONFLICT (record_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
