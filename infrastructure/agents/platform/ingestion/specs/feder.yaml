source_id: feder
source_num: 99
layer: 15
couche: Subventions
name: FEDER — bénéficiaires fonds européens
description: 'Source #99 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://www.europe-en-france.gouv.fr/api/v1/beneficiaires
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.feder_raw
bronze_fields:
- name: operation_id
  type: VARCHAR(64)
  primary_key: true
- name: siren_beneficiaire
  type: CHAR(9)
  primary_key: false
- name: nom_beneficiaire
  type: VARCHAR(512)
  primary_key: false
- name: montant_feder
  type: NUMERIC
  primary_key: false
- name: date_decision
  type: DATE
  primary_key: false
- name: thematique
  type: VARCHAR(128)
  primary_key: false
conflict_strategy: ON CONFLICT (operation_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
