source_id: ess_france
source_num: 131
layer: 18
couche: Sectoriel
name: Observatoire ESS France
description: 'Source #131 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://ess-france.org/api/v1/entreprises
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.ess_entreprises_raw
bronze_fields:
- name: siret
  type: CHAR(14)
  primary_key: true
- name: denomination
  type: VARCHAR(512)
  primary_key: false
- name: forme_ess
  type: VARCHAR(64)
  primary_key: false
- name: effectif
  type: INT
  primary_key: false
- name: departement
  type: VARCHAR(8)
  primary_key: false
conflict_strategy: ON CONFLICT (siret) DO UPDATE SET payload = EXCLUDED.payload, ingested_at
  = now()
