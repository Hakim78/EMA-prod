bronze_table: bronze.feader_raw
bronze_fields:
- name: operation_id
  type: VARCHAR(64)
  primary_key: true
- name: siret
  type: CHAR(14)
  primary_key: false
- name: nom
  type: VARCHAR(512)
  primary_key: false
- name: montant
  type: NUMERIC
  primary_key: false
- name: annee
  type: INT
  primary_key: false
conflict_strategy: ON CONFLICT (operation_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
