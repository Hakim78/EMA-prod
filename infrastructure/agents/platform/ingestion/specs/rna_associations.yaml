source_id: rna_associations
source_num: 7
layer: 1
couche: Identification
name: RNA — Répertoire National des Associations
description: 'Source #7 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://entreprise.data.gouv.fr/api/rna/v1/full_text/
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=168
sla_minutes: 10140
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.rna_associations_raw
bronze_fields:
- name: rna_id
  type: VARCHAR(16)
  primary_key: true
- name: titre
  type: VARCHAR(512)
  primary_key: false
- name: objet
  type: TEXT
  primary_key: false
- name: date_creation
  type: DATE
  primary_key: false
- name: commune
  type: VARCHAR(255)
  primary_key: false
- name: naf
  type: VARCHAR(8)
  primary_key: false
conflict_strategy: ON CONFLICT (rna_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
