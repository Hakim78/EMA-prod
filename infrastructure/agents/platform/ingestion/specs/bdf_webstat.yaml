source_id: bdf_webstat
source_num: 18
layer: 3
couche: Comptes & finances
name: Banque de France Webstat — endettement sectoriel
description: 'Source #18 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://api.webstat.banque-france.fr/webstat-fr/v1/data
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.bdf_webstat_raw
bronze_fields:
- name: series_key
  type: VARCHAR(128)
  primary_key: true
- name: date_period
  type: DATE
  primary_key: false
- name: value
  type: NUMERIC
  primary_key: false
- name: indicator_name
  type: VARCHAR(255)
  primary_key: false
conflict_strategy: ON CONFLICT (series_key) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
