source_id: bce_belge
source_num: 28
layer: 4
couche: Marchés cotés
name: Registre BCE belge — filiales BE
description: 'Source #28 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://kbopub.economie.fgov.be/kbopub/api/v1/enterprises
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.bce_belge_raw
bronze_fields:
- name: vat_number
  type: VARCHAR(16)
  primary_key: true
- name: name
  type: VARCHAR(512)
  primary_key: false
- name: status
  type: VARCHAR(64)
  primary_key: false
- name: commune
  type: VARCHAR(255)
  primary_key: false
conflict_strategy: ON CONFLICT (vat_number) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
