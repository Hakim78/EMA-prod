source_id: dvf
source_num: 70
layer: 11
couche: Immobilier
name: DVF — transactions immobilières depuis 2014
description: 'Source #70 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://api.cquest.org/dvf
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.dvf_transactions_raw
bronze_fields:
- name: mutation_id
  type: VARCHAR(64)
  primary_key: true
- name: date_mutation
  type: DATE
  primary_key: false
- name: valeur_fonciere
  type: NUMERIC
  primary_key: false
- name: code_postal
  type: VARCHAR(8)
  primary_key: false
- name: type_local
  type: VARCHAR(64)
  primary_key: false
- name: surface_bati
  type: NUMERIC
  primary_key: false
- name: geo_lon
  type: NUMERIC
  primary_key: false
- name: geo_lat
  type: NUMERIC
  primary_key: false
conflict_strategy: ON CONFLICT (mutation_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
