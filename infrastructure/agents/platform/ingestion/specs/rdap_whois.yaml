source_id: rdap_whois
source_num: 110
layer: 16
couche: Web/digital
name: RDAP/WHOIS — enregistrement domaines
description: 'Source #110 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://rdap.afnic.fr/domain/
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=720
sla_minutes: 43260
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.rdap_whois_raw
bronze_fields:
- name: domain
  type: VARCHAR(255)
  primary_key: true
- name: registrar
  type: VARCHAR(255)
  primary_key: false
- name: registration_date
  type: DATE
  primary_key: false
- name: expiration_date
  type: DATE
  primary_key: false
conflict_strategy: ON CONFLICT (domain) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
