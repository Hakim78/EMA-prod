source_id: transparence_ue
source_num: 96
layer: 14
couche: Lobbying
name: Registre Transparence UE
description: 'Source #96 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://ec.europa.eu/transparencyregister/api/v1/registrations
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=168
sla_minutes: 10140
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.transparence_ue_raw
bronze_fields:
- name: identification_code
  type: VARCHAR(64)
  primary_key: true
- name: organisation_name
  type: VARCHAR(512)
  primary_key: false
- name: country
  type: VARCHAR(8)
  primary_key: false
- name: category
  type: VARCHAR(128)
  primary_key: false
- name: date_registration
  type: DATE
  primary_key: false
conflict_strategy: ON CONFLICT (identification_code) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
