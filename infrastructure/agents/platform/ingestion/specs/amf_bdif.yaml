source_id: amf_bdif
source_num: 22
layer: 4
couche: Marchés cotés
name: AMF BDIF — franchissements seuils, déclarations dirigeants
description: 'Source #22 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://bdif.amf-france.org/api/v1/declarations
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=24
sla_minutes: 1500
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.amf_bdif_raw
bronze_fields:
- name: declaration_id
  type: VARCHAR(64)
  primary_key: true
- name: isin
  type: VARCHAR(12)
  primary_key: false
- name: societe
  type: VARCHAR(512)
  primary_key: false
- name: date_declaration
  type: DATE
  primary_key: false
- name: type_seuil
  type: VARCHAR(64)
  primary_key: false
- name: pourcentage
  type: NUMERIC
  primary_key: false
conflict_strategy: ON CONFLICT (declaration_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
