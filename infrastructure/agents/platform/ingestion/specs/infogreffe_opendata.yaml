source_id: infogreffe_opendata
source_num: 31
layer: 5
couche: Publications légales
name: Infogreffe Open Data — procédures collectives, RBE
description: 'Source #31 ARCHITECTURE_DATA_V2. Bronze ingestion raw — traité ensuite
  par silver/gold/mart.'
endpoint: https://data.inpi.fr/api/infogreffe/procedures
auth: none
pattern: rest_json_public
refresh_trigger: interval_hours=24
sla_minutes: 1500
license: Public / Etalab 2.0 par défaut
bronze_table: bronze.infogreffe_procedures_raw
bronze_fields:
- name: procedure_id
  type: VARCHAR(64)
  primary_key: true
- name: siren
  type: CHAR(9)
  primary_key: false
- name: type_procedure
  type: VARCHAR(64)
  primary_key: false
- name: date_ouverture
  type: DATE
  primary_key: false
- name: tribunal
  type: VARCHAR(255)
  primary_key: false
conflict_strategy: ON CONFLICT (procedure_id) DO UPDATE SET payload = EXCLUDED.payload,
  ingested_at = now()
